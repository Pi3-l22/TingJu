name: Release

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    build:
        strategy:
            matrix:
                os: [windows-latest, ubuntu-latest, macos-latest]
                include:
                    - os: windows-latest
                      asset-suffix: windows
                    - os: ubuntu-latest
                      asset-suffix: linux
                    - os: macos-latest
                      asset-suffix: macos

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt pyinstaller

            - name: Install UPX (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  choco install upx -y
                  echo "UPX_PATH=C:\ProgramData\chocolatey\bin" >> $env:GITHUB_ENV

            # - name: Install UPX (Linux) (not used)
            #   if: runner.os == 'Linux'
            #   run: |
            #       sudo apt-get update
            #       sudo apt-get install -y upx

            # - name: Install UPX (macOS) (not used)
            #   if: runner.os == 'macOS'
            #   run: |
            #       brew install upx

            - name: Install 7zip (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  choco install 7zip -y

            - name: Install 7zip (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y p7zip-full

            - name: Install 7zip (macOS)
              if: runner.os == 'macOS'
              run: |
                  brew install p7zip create-dmg

            - name: Build executable with PyInstaller
              run: |
                  pyinstaller --name TingJu --onedir --icon "${{ github.workspace }}/static/img/icon.ico" --distpath ./dist --workpath ./build --specpath ./spec app.py

            - name: Copy extra directories and files
              shell: bash
              run: |
                  cp -r static templates dist/TingJu
                  [ -f README.md ] && cp README.md dist/TingJu/ || true
                  [ -f LICENSE ] && cp LICENSE dist/TingJu/ || true

            - name: Make binary executable (Unix)
              if: runner.os != 'Windows'
              run: chmod +x dist/TingJu/TingJu

            - name: Ad-hoc sign and create DMG (macOS)
              if: runner.os == 'macOS'
              run: |
                  # Ad-hoc sign the binary and its bundled libraries
                  # This allows users to right-click → Open to bypass Gatekeeper
                  codesign --force --deep --sign - dist/TingJu/TingJu
                  echo "✅ Binary ad-hoc signed"

                  # Create DMG (preserves symlinks, avoids ZIP quarantine issues)
                  DMG_NAME="TingJu-${{ github.ref_name }}-macos.dmg"
                  create-dmg \
                    --volname "TingJu" \
                    --window-pos 200 120 \
                    --window-size 600 400 \
                    --icon-size 100 \
                    --icon "TingJu" 175 190 \
                    --app-drop-link 425 190 \
                    --no-internet-enable \
                    "$DMG_NAME" \
                    dist/TingJu/
                  echo "✅ DMG created: $DMG_NAME"

            - name: Create zip archive (Windows/Linux)
              if: runner.os != 'macOS'
              run: |
                  7z a -tzip -mx=9 "TingJu-${{ github.ref_name }}-${{ matrix.asset-suffix }}.zip" ./dist/TingJu/*

            - name: Upload artifact (macOS DMG)
              if: runner.os == 'macOS'
              uses: actions/upload-artifact@v4
              with:
                  name: TingJu-${{ github.ref_name }}-macos
                  path: TingJu-${{ github.ref_name }}-macos.dmg
                  if-no-files-found: error

            - name: Upload artifact (Windows/Linux ZIP)
              if: runner.os != 'macOS'
              uses: actions/upload-artifact@v4
              with:
                  name: TingJu-${{ github.ref_name }}-${{ matrix.asset-suffix }}
                  path: TingJu-${{ github.ref_name }}-${{ matrix.asset-suffix }}.zip
                  if-no-files-found: error

    release:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Display structure of downloaded files
              run: ls -R artifacts

            - name: Generate release notes
              run: |
                  # Get the previous tag for changelog compare link
                  PREV_TAG=$(git tag --sort=-v:refname | grep -v "${{ github.ref_name }}" | head -1)
                  if [ -n "$PREV_TAG" ]; then
                    CHANGELOG_LINK="[Full Changelog](https://github.com/Pi3-l22/TingJu/compare/${PREV_TAG}...${{ github.ref_name }})"
                  else
                    CHANGELOG_LINK="初始版本发布"
                  fi

                  # Read template and replace placeholders
                  cp .github/release_template.md RELEASE.md
                  sed -i "s|__VERSION__|${{ github.ref_name }}|g" RELEASE.md
                  sed -i "s|{{ CHANGELOG }}|${CHANGELOG_LINK}|g" RELEASE.md
                  echo "Generated release notes:"
                  cat RELEASE.md

            - name: Create release and upload assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  body_path: RELEASE.md
                  draft: false
                  prerelease: false
                  files: |
                      artifacts/*/*.dmg
                      artifacts/*/*.zip
